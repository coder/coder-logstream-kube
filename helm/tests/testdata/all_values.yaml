url: "http://coder.coder.svc.cluster.local"
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 1
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/instance
                operator: In
                values:
                  - coder-logstream-kube
args:
  - --coder-url
  - "http://coder.coder.svc.cluster.local"
image:
  repo: custom-internal-registry.nicecorp.org/coder-logstream-kube
  tag: v1.2.3
  pullPolicy: Always
  pullSecrets: 
    - name: super-secret-pull-secret
  sslCertFile: /etc/ssl/certs/my-custom-cert.pem
  sslCertDir: /etc/ssl/certs/my-custom-cert-directory/
labelSelector: com.coder.deployment=dev-coder.nicecorp.org
labels:
  label-one: turtle
  label-two: cat
metrics:
  enabled: true
  port: 9998
namespaces:
  - coder
  - coder-workloads
nodeSelector:
  kubernetes.io/os: linux
  topology.kubernetes.io/zone: us-east-1a
podSecurityContext:
  fsGroup: 655
rbac:
  roleName: coder-logstream-kube-custom-role-name
  roleBindingName: coder-logstream-kube-rolebinding-custom-rb-name
resources:
  limits:
    cpu: 500m
    memory: 500Mi
  requests:
    cpu: 2000m
    memory: 2000Mi
securityContext:
  runAsNonRoot: true
  runAsUser: 655
  runAsGroup: 655
  allowPrivilegeEscalation: true
serviceAccount:
  annotations:
    golden: test
  labels:
    testing: golden
  name: coder-logstream-kube-custom-name
tolerations:
  - key: "dedicated"
    operator: "Equal"
    value: "monitoring"
    effect: "NoSchedule"
  - key: "node.kubernetes.io/not-ready"
    operator: "Exists"
    effect: "NoExecute"
    tolerationSeconds: 30
image:
  tag: latest
volumes:
  - name: custom-ca
    configMap:
      name: custom-ca-cert
volumeMounts:
  - name: custom-ca
    mountPath: /etc/ssl/custom
    readOnly: true
